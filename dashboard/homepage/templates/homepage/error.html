<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - QuantLabs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d0d0d; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .error-card { background: #1a1a1a; padding: 40px; border-radius: 20px; border: 1px solid #333; text-align: center; }
    </style>
</head>
<body>
    <div class="error-card">
        <h1 class="display-1 fw-bold text-danger">404</h1>
        <h3 class="fw-bold mb-4">{{ message|default:"Page not found" }}</h3>
        <a href="/" class="btn btn-outline-light">Back to Home</a>
    </div>
    {% include "statcounter.html" %}
</body>
</html>
