<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ asset_name }} Dashboard | Market Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --nifty-blue: #007bff;
            --nifty-orange: #ff9933;
            --dark-bg: #0d0d0d;
            --card-bg: #1a1a1a;
            --text-muted: #aaa;
            --positive: #00ff00;
            --negative: #ff4d4d;
        }
        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Inter', sans-serif;
        }
        .navbar {
            background-color: rgba(13, 13, 13, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #333;
        }
        .dashboard-container {
            padding-top: 100px;
            padding-bottom: 80px;
        }
        .stat-card {
            background-color: var(--card-bg);
            border: 1px solid #333;
            border-radius: 16px;
            padding: 24px;
            height: 100%;
        }
        .graph-container {
            background-color: var(--card-bg);
            border: 1px solid #333;
            border-radius: 24px;
            padding: 30px;
            margin-top: 30px;
        }
        .interval-card {
            background-color: var(--card-bg);
            border: 1px solid #333;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            display: block;
        }
        .interval-card:hover {
            border-color: var(--nifty-blue);
            transform: translateY(-5px);
            color: white;
        }
        .interval-label {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--nifty-orange);
            margin-bottom: 10px;
        }
        .btn-back {
            color: var(--text-muted);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .btn-back:hover {
            color: white;
        }
        .asset-price {
            font-size: 2.5rem;
            font-weight: 800;
        }
        .positive { color: var(--positive); }
        .negative { color: var(--negative); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Intelligence<span>.</span></a>
        </div>
    </nav>

    <div class="container dashboard-container">
        <a href="/" class="btn-back">← Back to Overview</a>
        
        <div class="row align-items-end mb-4">
            <div class="col-md-6">
                <h1 class="display-4 fw-800 mb-0">{{ asset_name }} <span style="color: var(--nifty-orange)">Intelligence</span></h1>
                <p class="text-muted">Real-time analysis and multi-interval forecasting</p>
            </div>
            <div class="col-md-6 text-md-end">
                <div class="asset-price">{{ latest_price }}</div>
                <div class="{% if is_positive %}positive{% else %}negative{% endif %} fw-bold">
                    {{ price_change }} ({{ pct_change }})
                </div>
            </div>
        </div>

        <div class="row">
            {% for interval in intervals %}
            <div class="col-md-3 mb-4">
                <a href="{% url 'nifty:interval_detail' interval %}" class="interval-card">
                    <div class="interval-label">{{ interval|upper }}</div>
                    <div class="text-muted small">View Details →</div>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
